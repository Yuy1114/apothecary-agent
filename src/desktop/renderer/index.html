<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self'; script-src 'self'; img-src 'self' data:;" />
    <title>Apothecary</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">A</div>
          <div><strong>Apothecary</strong><span>Knowledge workspace</span></div>
        </div>
        <nav aria-label="主要导航">
          <button class="nav-item active" data-view="chat"><span>✦</span> 对话</button>
          <button class="nav-item" data-view="changes"><span>↻</span> 变更 <b id="changes-badge" class="badge hidden">0</b></button>
          <button class="nav-item" data-view="inbox"><span>⌁</span> Inbox</button>
          <button class="nav-item" data-view="proposals"><span>◇</span> 提案 <b id="proposals-badge" class="badge hidden">0</b></button>
          <button class="nav-item" data-view="knowledge"><span>⌘</span> 知识画像</button>
        </nav>
        <div class="vault-card">
          <span class="status-dot"></span>
          <div><small>当前药柜</small><strong id="vault-name">加载中…</strong></div>
        </div>
      </aside>

      <main class="main-area">
        <header class="topbar">
          <div><p class="eyebrow" id="view-eyebrow">UNIFIED AGENT</p><h1 id="view-title">和你的知识药柜对话</h1></div>
          <button id="refresh-button" class="icon-button" title="刷新当前页面">↻</button>
        </header>

        <section id="view-chat" class="view active">
          <div class="chat-layout">
            <div id="chat-messages" class="chat-messages">
              <div class="message assistant"><div class="avatar">A</div><div class="bubble"><strong>Apothecary</strong><p>你好。我可以帮你检索知识、处理变更、归位 inbox，或把对话沉淀成可审阅的提案。</p></div></div>
            </div>
            <form id="chat-form" class="composer">
              <textarea id="chat-input" rows="3" placeholder="问一个问题，或告诉我想添加、整理什么内容…"></textarea>
              <div class="composer-footer"><span>所有真实文件修改都需要提案确认</span><button type="submit" class="primary">发送 <span>⌘↵</span></button></div>
            </form>
          </div>
          <aside class="context-panel">
            <h3>现在可以做什么</h3>
            <button class="prompt-chip" data-prompt="有哪些文件发生了变更？请帮我判断应该如何处理。">检查最近变更</button>
            <button class="prompt-chip" data-prompt="请扫描 inbox，并建议这些文件应该归位到哪里。">整理 Inbox</button>
            <button class="prompt-chip" data-prompt="根据当前药柜，总结我的核心知识主题和薄弱区域。">查看知识画像</button>
            <div class="divider"></div>
            <h3>最近活动</h3>
            <div id="recent-operations" class="mini-list"><p class="muted">暂无活动</p></div>
          </aside>
        </section>

        <section id="view-changes" class="view">
          <div class="section-toolbar"><div><h2>待处理变更</h2><p>由 watcher、manual sync 或恢复队列记录</p></div><button id="sync-button" class="secondary">运行 Manual Sync</button></div>
          <div id="changes-list" class="card-list"></div>
        </section>

        <section id="view-inbox" class="view">
          <div class="section-toolbar"><div><h2>Inbox</h2><p>理解内容后，再生成归位提案</p></div><button id="triage-all-button" class="secondary">让 Agent 分析全部</button></div>
          <div class="split-view"><div id="inbox-list" class="card-list compact"></div><div id="inbox-detail" class="detail-panel empty-state">选择一个文件查看内容</div></div>
        </section>

        <section id="view-proposals" class="view">
          <div class="section-toolbar"><div><h2>变更提案</h2><p>所有 human-readable layer 修改的统一确认入口</p></div><div class="segmented" id="proposal-filter"><button class="active" data-status="proposed">待确认</button><button data-status="applied">已应用</button><button data-status="rejected">已拒绝</button></div></div>
          <div id="proposals-list" class="card-list"></div>
        </section>

        <section id="view-knowledge" class="view">
          <div class="section-toolbar"><div><h2>知识画像</h2><p>药柜当前主题、关系与维护机会</p></div><button id="knowledge-chat-button" class="secondary">和 Agent 讨论画像</button></div>
          <div id="knowledge-content" class="knowledge-grid"></div>
        </section>
      </main>
    </div>

    <div id="toast" class="toast" role="status"></div>
    <script src="./app.js"></script>
  </body>
</html>
